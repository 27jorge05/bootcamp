<html>

<head>
    <title>prueba de frames</title>
</head>
<frameset cols="200,*">
    <frame src="pagina2.html" noresize>
    <frameset rows="70,*">
        <frame src="pagina3.html" noresize >
        <frameset rows="4*,3*">

            <frame src="pagina4.html" noresize >
            <frame src="pagina1.html" noresize >
        </frameset>
    </frameset>
    <noframes>
        <p>El navegador no soporta frames</p>
    </noframes>
</frameset>

</html>
