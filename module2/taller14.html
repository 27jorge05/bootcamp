<!DOCTYPE HTML>
<html>

<head>
    <title>Título de la página</title>
    <meta charset="UTF-8">

    <script type="text/javascript">
        function retornarLienzo(x) {
            var canvas = document.getElementById(x);
            if (canvas.getContext) {
                var lienzo = canvas.getContext("2d");
                return lienzo;
            } else
                return false;
        }

        function dibujar() {
            var lienzo = retornarLienzo("lienzo1");
            if (lienzo) {
                var gradiente1 = lienzo.createLinearGradient(0, 0, 200, 200);
                gradiente1.addColorStop(0, "rgb(255,0,0)");
                gradiente1.addColorStop(1, "rgb(0,255,0)");
                lienzo.fillStyle = gradiente1;
                lienzo.fillRect(0, 0, 200, 250);

                lienzo.fillStyle=gradiente1;
                lienzo.fillRect(210,210,50,50);

                var gradiente2 = lienzo.createLinearGradient(200, 300, 0, 300);
                gradiente2.addColorStop(0, "rgb(255,0,0)");
                gradiente2.addColorStop(1, "rgb(0,0,255)");
                lienzo.fillStyle = gradiente2;
                lienzo.fillRect(0, 300, 200, 200);

                var gradiente3 = lienzo.createLinearGradient(300, 0, 500, 200);
                gradiente3.addColorStop(0, "rgb(255,200,0)");
                gradiente3.addColorStop(1, "rgb(255,0,255");
                lienzo.fillStyle = gradiente3;
                lienzo.fillRect(300, 0, 200, 200);

                var gradiente4 = lienzo.createLinearGradient(300, 300, 500, 500);
                gradiente4.addColorStop(0, "rgb(255,60,0)");
                gradiente4.addColorStop(0.4, "rgb(0,50,0)");
                gradiente4.addColorStop(0.7, "rgb(255,60,0)");
                gradiente4.addColorStop(1, "rgb(25,160,30)");
                lienzo.fillStyle = gradiente4;
                lienzo.fillRect(300, 300, 200, 200);
            }
        }

    </script>

</head>

<body onLoad="dibujar()">
    <canvas id="lienzo1" width="600" height="600">
        Su navegador no permite utilizar canvas.
    </canvas>
</body>

</html>
