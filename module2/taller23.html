<!DOCTYPE HTML>
<html>

<head>
  <title>Título de la página</title>
  <meta charset="UTF-8">

  <script>


    addEventListener('load', inicio, false);

    console.log("entra3");
    function inicio() {
      console.log("entra2");
      document.getElementById('temp').innerHTML = document.getElementById('temperatura').value;
      document.getElementById('temp').style.color = document.getElementById('color1').value;
      document.getElementById('temperatura').addEventListener('change', cambioTemperatura, false);
      document.getElementById('color1').addEventListener('change', cambioColor, false);

    }

    function cambioTemperatura() {
      console.log("entra");
      document.getElementById('temp').innerHTML = document.getElementById('temperatura').value;

    }

    function cambioColor() {
      console.log("entracolor");

      document.getElementById('temp').style.color = document.getElementById('color1').value;
    }
  </script>

</head>

<body>
  <form action="#" novalidate>
    Seleccione una temperatura:
    <input type="range" id="temperatura" min="0" max="100">
    <span id="temp">0</span>
    <br>
    <p>Seleccione un color:
      <input type="color" id="color1" name="color1">
    </p>


    <p>Ingrese un valor entre 1 y 10:
      <input type="number" id="valor" name="valor" min="1" max="100">
    </p>
    <hr>
    <p>Dirección Web 1:
      <input type="url" id="direccion1" name="direccion1" size="30" required>
    </p>
    <p>Dirección Web 2:
      <input type="url" id="direccion2" name="direccion2" size="30" required>
    </p>
    <p>Dirección Web 3:
      <input type="url" id="direccion3" name="direccion3" size="30" required>
    </p>

    Ingrese el nombre de navegador que utiliza:
    <input type="text" id="navegador" list="listanavegadores">
    <datalist id="listanavegadores">
      <option label="Chrome" value="Chrome">
      <option label="Firefox" value="Firefox">
      <option label="Internet Explorer" value="Internet Explorer">
      <option label="Microsoft Edge" value="Microsoft Edge">
      <option label="Safari" value="Safari">
    </datalist>
    <br>


    Usuario:
    <input type="text" id="usuario" required>
    <br>
    Clave:
    <input type="password" id="clave" required>
    <br>

    <p><input type="submit" value="Confirmar"></p>
  </form>
</body>

</html>
