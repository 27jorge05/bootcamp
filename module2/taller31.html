<!DOCTYPE HTML>
<html>

<head>
    <title>Título de la página</title>
    <meta charset="UTF-8">

    <script>
        window.addEventListener('load', inicio, false);

        function inicio() {
            document.getElementById('archivo').addEventListener('change', cargar, false);
        }

        var dataFiles="";
        function cargar(ev) {
            for (var f = 0; f < ev.target.files.length; f++) {
                dataFiles+= f+"/"+(ev.target.files.length-1)+' Nombre del archivo:' + ev.target.files[f].name + '<br>' +
                    'Tamaño del archivo:' + ev.target.files[f].size + '<br>' +
                    'Tipo MIME:' + ev.target.files[f].type+ '<br>'+ '<br>'+ '<br>' ;
            }
            document.getElementById('datos').innerHTML = dataFiles
            var arch = new FileReader();
            arch.addEventListener('load', leer, false);
            arch.readAsText(ev.target.files[0]);
        }

        function leer(ev) {
            document.getElementById('editor').value = ev.target.result;
        }
    </script>
</head>

<body>
    <input type="file" id="archivo" multiple><br>
    <textarea rows="15" cols="80" id="editor"></textarea>
    <br>
    <p id="datos"></p>
</body>

</html>
