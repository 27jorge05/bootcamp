<!DOCTYPE HTML>
<html>

<head>
    <title>Título de la página</title>
    <meta charset="UTF-8">
</head>

<body>
    <form action="#">
        Usuario:
        <input type="text" id="usuario" placeholder="AB123CD" required pattern="[a-zA-Z]{5,10}[0-9]{2}">
        <br>
        Clave:
        <input type="password" id="clave" required>
        <br>
        Edad:
        <input type="text" id="edad" autofocus required pattern="[0-9]{1,2}">
        <br>
        <label for="numero">BINARIO:</label>
        <input type="text" id="numero" required pattern="[01]{8}">
        <br>
        <label for="email">correo:</label>
        <input type="email" id="email" required>
        <br>
        Seleccione una temperatura:
        <input type="range" id="temperatura" min="0" max="100">
        <br>
        <input type="submit" value="Confirmar">
        
    </form>
</body>

</html>
