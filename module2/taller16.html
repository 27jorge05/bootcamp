<!DOCTYPE HTML>
<html>

<head>
    <title>Título de la página</title>
    <meta charset="UTF-8">

    <script type="text/javascript">
        function retornarLienzo(x) {
            var canvas = document.getElementById(x);
            if (canvas.getContext) {
                var lienzo = canvas.getContext("2d");
                return lienzo;
            } else
                return false;
        }

        function dibujar() {
            var lienzo = retornarLienzo("lienzo1");
            if (lienzo) {
                img1 = new Image();
                img1.src = 'http://www.tutorialesprogramacionya.com/imagenes/foto1.jpg';
                img1.onload = function () {
                    var patron = lienzo.createPattern(img1, 'repeat');
                    lienzo.fillStyle = patron;
                    lienzo.fillRect(0, 0, 600, 600);
                    
                    var patron2 = lienzo.createPattern(img1,'repeat-y');
                    lienzo.fillStyle=patron2;
                    lienzo.arc(200,200,100,0,Math.PI*2,true);
                    
                    lienzo.fill();
                    lienzo.stroke();


                }
            }
        }

    </script>

</head>

<body onLoad="dibujar()">
    <canvas id="lienzo1" width="600" height="600">
        Su navegador no permite utilizar canvas.
    </canvas>
</body>

</html>
