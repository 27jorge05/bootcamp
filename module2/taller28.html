<!DOCTYPE HTML>
<html>

<head>
    <title>Título de la página</title>
    <meta charset="UTF-8">

    <style>
        #recuadro {
            width: 300px;
            height: 50px;
            background-color: yellow;
            border-style: solid;
            border-color: red;
            font-size: 1.5em;
        }

        #palabras span {
            font-size: 1.5em;
        }
    </style>

    <script>
        window.addEventListener('load', inicio, false);

        function inicio() {
            document.getElementById('palabra1').addEventListener('dragstart', drag, false);
            document.getElementById('palabra2').addEventListener('dragstart', drag, false);
            document.getElementById('palabra3').addEventListener('dragstart', drag, false);
            document.getElementById('palabra4').addEventListener('dragstart', drag, false);
            document.getElementById('recuadro').addEventListener('dragover', permitirDrop, false);
            document.getElementById('recuadro').addEventListener('drop', drop, false);
        }

        function drag(ev) {
            ev.dataTransfer.setData("Text", ev.target.id);
        }

        function drop(ev) {
            ev.preventDefault();

            var dato = ev.dataTransfer.getData("Text");
            var elementoArrastrado = document.getElementById(dato);

            var elementoDestino = ev.target;

            if (elementoDestino.tagName === "SPAN") {
                var rect = elementoDestino.getBoundingClientRect();
                var mitad = rect.left + rect.width / 2;

                if (ev.clientX < mitad) {
                    elementoDestino.parentNode.insertBefore(elementoArrastrado, elementoDestino);
                } else {
                    elementoDestino.parentNode.insertBefore(elementoArrastrado, elementoDestino.nextSibling);
                }
            } else {
                elementoDestino.appendChild(elementoArrastrado);
            }
        }

        function permitirDrop(ev) {
            ev.preventDefault();
        }
        function ladoDelElemento(ev, elemento) {
            var rect = elemento.getBoundingClientRect();
            var mitad = rect.left + rect.width / 2;

            if (ev.clientX < mitad) {
                return "izquierda";
            } else {
                return "derecha";
            }
        }
    </script>

</head>

<body>
    <p>Arrastre en orden las palabras para formar la oración correcta.</p>
    <div id="recuadro"></div>
    <div id="palabras">
        <span id="palabra1" draggable="true">the </span>
        <span id="palabra2" draggable="true">is </span>
        <span id="palabra3" draggable="true">What </span>
        <span id="palabra4" draggable="true">time </span>
    </div>
</body>

</html>
