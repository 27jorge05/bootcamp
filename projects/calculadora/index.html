<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="calculator" aria-label="Calculadora">
      <div class="screen" aria-live="polite">
        <p class="operation" id="operation"></p>
        <p class="result" id="result">0</p>
      </div>

      <div class="keys">
        <button class="key key-clear" type="button" data-action="clear">C</button>
        <button class="key" type="button" data-action="delete">⌫</button>
        <button class="key" type="button" data-action="percent">%</button>
        <button class="key key-operator" type="button" data-value="/">÷</button>

        <button class="key" type="button" data-value="7">7</button>
        <button class="key" type="button" data-value="8">8</button>
        <button class="key" type="button" data-value="9">9</button>
        <button class="key key-operator" type="button" data-value="*">×</button>

        <button class="key" type="button" data-value="4">4</button>
        <button class="key" type="button" data-value="5">5</button>
        <button class="key" type="button" data-value="6">6</button>
        <button class="key key-operator" type="button" data-value="-">−</button>

        <button class="key" type="button" data-value="1">1</button>
        <button class="key" type="button" data-value="2">2</button>
        <button class="key" type="button" data-value="3">3</button>
        <button class="key key-operator" type="button" data-value="+">+</button>

        <button class="key key-zero" type="button" data-value="0">0</button>
        <button class="key" type="button" data-value=".">.</button>
        <button class="key key-equal" type="button" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
