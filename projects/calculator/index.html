<!DOCTYPE html>
<html>

<head>
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <main class="page">
        <section class="calculator1">
            <div class="title">
                <h1>Calculator</h1>
            </div>
            <div class="upButtons">

                <button class="themeButton upButton" id="themeButton" type="button">
                    🌙
                </button>
                <button class="clearHistory upButton" id="clearHistory" type="button">
                    Clear History
                </button>
            </div>
            <div class="screen">
                <p class="operation" id="operation"></p>
                <p class="result" id="result">0</p>
            </div>
            <div class="history hidden" id="history"></div>
            <div class="keys">
                <button class="key keyClear" type="button" data-action="clear">C</button>
                <button class="key keyDelete" type="button" data-action="delete">⌫</button>
                <button class="key keySpecial" type="button" data-action="percent">%</button>
                <button class="key keyOperation" type="button" data-value="/">÷</button>

                <button class="key" type="button" data-value="7">7</button>
                <button class="key" type="button" data-value="8">8</button>
                <button class="key" type="button" data-value="9">9</button>
                <button class="key keyOperation" type="button" data-value="*">×</button>

                <button class="key" type="button" data-value="4">4</button>
                <button class="key" type="button" data-value="5">5</button>
                <button class="key" type="button" data-value="6">6</button>
                <button class="key keyOperation" type="button" data-value="-">-</button>

                <button class="key" type="button" data-value="1">1</button>
                <button class="key" type="button" data-value="2">2</button>
                <button class="key" type="button" data-value="3">3</button>
                <button class="key keyOperation" type="button" data-value="+">+</button>

                <button class="key" type=" button" data-value="0">0</button>
                <button class="key keySpecial" type=" button" data-value="3.141516">π</button>
                <button class="key" type=" button" data-value=".">.</button>
                <button class="key keyEqual" type=" button" data-action="equals">=</button>



            </div>
        </section>
    </main>

</body>
<script src="script.js"></script>

</html>
