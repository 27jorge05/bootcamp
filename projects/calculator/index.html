<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
            <link rel="stylesheet" href="styles.css">

    </head>
    <body>
        <main class="page">
            <section class="calculator1">
                <div class="screen">
                    <p class="operation" id="operation"></p>
                    <p class="result" id="result">0</p>
                </div>
                <div class="keys">
                    <button class="key keyClear" type="button" >C</button>
                    <button class="key keyDelete" type="button" >⌫</button>
                    <button class="key keySpecial" type="button" >%</button>
                    <button class="key keyOperation" type="button" >÷</button>

                    <button class="key" type="button" >7</button>
                    <button class="key" type="button" >8</button>
                    <button class="key" type="button" >9</button>
                    <button class="key keyOperation" type="button" >×</button>

                    <button class="key" type="button" >4</button>
                    <button class="key" type="button" >5</button>
                    <button class="key" type="button" >6</button>
                    <button class="key keyOperation" type="button" >-</button>

                    <button class="key" type="button" >1</button>
                    <button class="key" type="button" >2</button>
                    <button class="key" type="button" >3</button>
                    <button class="key keyOperation" type="button" >+</button>

                    <button class="key" type=" button" >0</button>
                    <button class="key keySpecial" type=" button" >π</button>
                    <button class="key" type=" button" >.</button>
                    <button class="key keyEqual" type=" button" >= </button>
 


                </div>
            </section>
        </main>

    </body>
    <script src="script.js"></script>
</html>
